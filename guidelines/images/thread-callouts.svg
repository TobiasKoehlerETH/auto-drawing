  <text x="105" y="130" font-family="Arial, sans-serif" font-size="24" fill="#1d4ed8">Metric / Unified</text>
  <text x="545" y="130" font-family="Arial, sans-serif" font-size="24" fill="#92400e">Pipe / special</text>
  <text x="105" y="175" font-family="Arial, sans-serif" font-size="20" fill="#111827">M10×1.5-6H</text>
  <text x="105" y="210" font-family="Arial, sans-serif" font-size="20" fill="#111827">M20×2-6g LH</text>
  <text x="105" y="245" font-family="Arial, sans-serif" font-size="20" fill="#111827">3/8-24 UNF-2A</text>
